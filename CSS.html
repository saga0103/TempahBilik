<style>
  :root {
    --teal: #0d9488;
    --teal-dark: #0f766e;
    --teal-light: #ccfbf1;
    --teal-pale: #f0fdfa;
  }

  * { font-family: 'Poppins', sans-serif; }

  body {
    background: var(--teal-pale);
    min-height: 100vh;
    padding-bottom: 20px;
  }

  .app-navbar {
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    padding: 14px 0;
  }

  .app-tabs {
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    padding: 8px 8px 0 8px;
    position: sticky;
    top: 0;
    z-index: 20;
    gap: 6px;
  }

  .app-tabs .nav-link {
    color: var(--teal-dark);
    font-weight: 500;
    border-radius: 12px 12px 0 0;
    font-size: 0.9rem;
    padding: 10px 6px;
  }

  .app-tabs .nav-link.active {
    background: var(--teal);
    color: #fff;
  }

  .text-teal { color: var(--teal-dark); }

  .btn-teal {
    background-color: var(--teal);
    border-color: var(--teal);
    color: #fff;
  }
  .btn-teal:hover, .btn-teal:active {
    background-color: var(--teal-dark) !important;
    border-color: var(--teal-dark) !important;
    color: #fff;
  }

  .card { background: #fff; }

  .form-control:focus, .form-select:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 0.2rem rgba(13,148,136,.15);
  }

  .slot-card {
    border-left: 4px solid var(--teal);
    background: var(--teal-light);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 10px;
  }

  .slot-card.diluluskan { border-left-color: #16a34a; background:#f0fdf4; }
  .slot-card.menunggu { border-left-color: #d97706; background:#fffbeb; }
  .slot-card.ditolak { border-left-color: #dc2626; background:#fef2f2; opacity:.7; }

  .badge-status {
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge-menunggu { background:#fef3c7; color:#92400e; }
  .badge-diluluskan { background:#dcfce7; color:#166534; }
  .badge-ditolak { background:#fee2e2; color:#991b1b; }

  .empty-state {
    text-align: center;
    color: #64748b;
    padding: 30px 10px;
    font-size: 0.9rem;
  }

  .admin-row {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }

  .admin-row .btn-sm {
    border-radius: 20px;
    font-size: 0.78rem;
  }

  @media (max-width: 480px) {
    .navbar-brand { font-size: 1rem; }
    .card-title { font-size: 1rem; }
  }

  #statusSlot .alert {
    border-radius: 12px;
    font-size: 0.88rem;
    padding: 10px 14px;
  }

  .spinner-border-sm-teal {
    color: var(--teal);
  }
</style>
